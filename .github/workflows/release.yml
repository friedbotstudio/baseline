# Push-driven release pipeline for `create-baseline`.
#
# Trigger: push (or merged PR) to main or next, OR workflow_dispatch with
# mode=docs-only for a Pages-only redeploy. Bump type, changelog, git tag,
# GitHub Release, and PR comments are all driven by semantic-release from
# conventional commits.
#
# Architecture: three jobs.
#   release       — runs semantic-release; publishes to npm (latest on main,
#                   next prerelease on next), creates GH Release, comments
#                   on closed PRs, commits CHANGELOG.md + package.json back,
#                   tags vX.Y.Z. Exports new_release_published + version
#                   for downstream gating.
#   deploy-pages  — needs: release. main branch only OR docs-only dispatch.
#                   Builds obj/site against post-release HEAD; deploys Pages.
#   install-smoke — needs: release. Runs when new_release_published==true.
#                   Materializes published tarball via create-baseline,
#                   hash-verifies manifest.
#
# Runbook: docs/runbooks/npm-publish.md (manual fallback + branch-protection
# migration callout) + docs/specs/semantic-release-automation.md.
#
# Action SHA verification (verify-action-shas.mjs runs as a release-job step
# before semantic-release fires, so a drifted SHA fails fast):
#   Every third-party action is pinned to a 40-char SHA with tag in trailing
#   comment per CLAUDE.md Art VII + runbook §Future-CI invariants Rule 1.
#   Re-resolve via `gh api repos/<owner>/<repo>/git/ref/tags/<tag>` and
#   update if drift is detected. Tag refs are mutable — never relax to `@vX`.

name: Release

on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      mode:
        description: 'docs-only = redeploy GitHub Pages without cutting a release. The auto-flow handles releases on push to main / next.'
        type: choice
        required: true
        default: docs-only
        options:
          - docs-only

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic_release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic_release.outputs.new_release_version }}
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Verify pinned action SHAs match upstream tags
        run: node scripts/verify-action-shas.mjs
      - name: Install dependencies
        run: npm ci
      - name: Verify provenance + signatures of installed dependencies
        run: npm audit signatures
      - id: semantic_release
        name: Run semantic-release
        if: inputs.mode != 'docs-only'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  deploy-pages:
    needs: release
    if: github.ref == 'refs/heads/main' && (needs.release.outputs.new_release_published == 'true' || inputs.mode == 'docs-only')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build docs site
        run: npm run build:site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: obj/site
      - id: deployment
        name: Deploy artifact to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  install-smoke:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Wait for registry replication (poll until version resolves)
        env:
          NEW_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 180))
          until npm view "create-baseline@${NEW_VERSION}" version >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "registry replication timed out after 180s for create-baseline@${NEW_VERSION}" >&2
              exit 1
            fi
            sleep 5
          done
          echo "create-baseline@${NEW_VERSION} resolves on registry"
      - name: Install published tarball and verify materialized manifest
        env:
          NEW_VERSION: ${{ needs.release.outputs.new_release_version }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-save "create-baseline@${NEW_VERSION}" >/dev/null
          node node_modules/create-baseline/bin/cli.js ./target
          node "${WORKSPACE}/scripts/install-smoke-verify.mjs" \
            "${tmp}/node_modules/create-baseline/obj/template/manifest.json" \
            "${tmp}/target/.claude/.baseline-manifest.json"

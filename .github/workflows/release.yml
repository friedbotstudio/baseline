# Push-driven release pipeline for `@friedbotstudio/create-baseline`.
#
# Trigger: push (or merged PR) to main or next, OR workflow_dispatch with
# mode=docs-only for a Pages-only redeploy. Bump type, changelog, git tag,
# GitHub Release, and PR comments are all driven by semantic-release from
# conventional commits.
#
# Architecture: three jobs.
#   pre-publish-checks — runs `npm run publish:check` (precheck dry-run +
#                        files-diff + smoke-tarball). Pre-publish gate. If
#                        any check fails, the release job does NOT run, so
#                        no broken tarball reaches npm.
#   release            — needs: pre-publish-checks. Runs semantic-release;
#                        publishes to npm (latest on main, next prerelease
#                        on next), creates GH Release, comments on closed
#                        PRs, commits CHANGELOG.md + package.json back, tags
#                        vX.Y.Z. Skipped on workflow_dispatch docs-only.
#   deploy-pages       — needs: release. main branch only. Builds obj/site
#                        against post-release HEAD; deploys Pages. Runs on
#                        every main push (whether or not a release fired)
#                        so site-src/ changes always reach the live site.
#
# Why no post-publish install-smoke job: pre-publish-checks runs the same
# install-smoke logic against the locally-packed tarball BEFORE npm publish,
# so a broken package never ships. Once `npm publish` returns success, the
# upload is on the registry; we don't need a follow-up confirmation job.
#
# Runbook: docs/runbooks/npm-publish.md (manual fallback + branch-protection
# migration callout) + docs/specs/release-workflow.md.
#
# Action SHA verification (verify-action-shas.mjs runs as the first content
# step of pre-publish-checks, so a drifted SHA fails fast before any other
# work):
#   Every third-party action is pinned to a 40-char SHA with tag in trailing
#   comment per CLAUDE.md Art VII + runbook §Future-CI invariants Rule 1.
#   Re-resolve via `gh api repos/<owner>/<repo>/git/ref/tags/<tag>` and
#   update if drift is detected. Tag refs are mutable — never relax to `@vX`.

name: Release

on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      mode:
        description: 'docs-only = redeploy GitHub Pages without cutting a release. The auto-flow handles releases on push to main / next.'
        type: choice
        required: true
        default: docs-only
        options:
          - docs-only

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  pre-publish-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Verify pinned action SHAs match upstream tags
        run: node scripts/verify-action-shas.mjs
      - name: Install dependencies
        run: npm ci
      - name: Verify provenance + signatures of installed dependencies
        run: npm audit signatures
      - name: Pre-publish checks (precheck + files-diff + smoke-tarball)
        run: npm run publish:check

  release:
    needs: pre-publish-checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic_release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic_release.outputs.new_release_version }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - id: semantic_release
        name: Run semantic-release
        if: inputs.mode != 'docs-only'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  deploy-pages:
    needs: release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build docs site
        run: npm run build:site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: obj/site
      - id: deployment
        name: Deploy artifact to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
